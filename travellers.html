<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travellers — Tap to Trip</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --aqua:#1FA3B1; --aqua-light:#38c5d5;
  --gold:#C9A84C; --gold-light:#e8c97e;
  --dark:#04070D;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
html,body{overflow-x:hidden;width:100%;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--aqua),var(--gold));border-radius:10px;}
body{background:var(--dark);color:white;overflow-x:hidden;}
body::after{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:99990;opacity:.35;
}

/* ── NAVBAR ── */
.navbar{
  position:fixed;width:100%;top:0;left:0;z-index:1000;
  padding:18px 60px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(4,7,13,.18);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 1px 0 rgba(255,255,255,.05);
  transition:.4s ease;
}
.navbar.scrolled{
  background:rgba(4,7,13,.82);
  backdrop-filter:blur(24px);
  box-shadow:0 8px 40px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.04);
  padding:14px 60px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.logo-img{
  height:26px;width:auto;
  filter:drop-shadow(0 0 10px rgba(31,163,177,.5));
  transition:.3s;
}
.logo-img:hover{filter:drop-shadow(0 0 20px rgba(31,163,177,.9));transform:scale(1.04);}

/* ── PROGRESS STEPS ── */
.trip-steps{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;gap:0;align-items:center;white-space:nowrap;
}
.step{
  font-size:12px;font-weight:500;color:rgba(255,255,255,.4);
  letter-spacing:.5px;cursor:pointer;transition:.3s;
  padding:6px 0;display:flex;align-items:center;gap:8px;
}
.step-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;transition:.3s;flex-shrink:0;
}
.step.done .step-num{background:rgba(201,168,76,.18);border-color:rgba(201,168,76,.5);color:var(--gold-light);}
.step.done{color:rgba(255,255,255,.45);}
.step.active .step-num{background:var(--aqua);border-color:var(--aqua);box-shadow:0 0 14px rgba(31,163,177,.55);color:#fff;}
.step.active{color:#fff;font-weight:600;}
.step:hover:not(.active):not(.done){color:rgba(255,255,255,.7);}
.step-connector{
  width:32px;height:1px;background:rgba(255,255,255,.12);
  margin:0 4px;flex-shrink:0;position:relative;overflow:hidden;
}
.step-connector::after{
  content:"";position:absolute;left:0;top:0;height:100%;width:0%;
  background:linear-gradient(90deg,var(--aqua),var(--gold));transition:.5s ease;
}
.step-connector.done::after{width:100%;}

/* ── SECTION ── */
.door-section{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
#bgVideo{
  position:absolute;width:100%;height:100%;
  object-fit:cover;opacity:1;z-index:-2;
}
.door-overlay{
  position:absolute;inset:0;z-index:-1;
  background:linear-gradient(135deg,rgba(4,7,13,.75) 0%,rgba(4,7,13,.55) 50%,rgba(4,7,13,.72) 100%);
}

/* ── GLASS PANEL ── */
.door-glass{
  width:90%;max-width:1100px;
  padding:44px 40px 48px;
  border-radius:28px;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 0 .5px rgba(255,255,255,.05) inset,0 30px 80px rgba(0,0,0,.65);
  animation:glassFloat 8s ease-in-out infinite;
  text-align:center;margin-top:80px;position:relative;
}
.door-glass::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:30%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
@keyframes glassFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

.glass-header{text-align:center;margin-bottom:44px;}
.glass-eyebrow{
  display:block;font-size:10px;font-weight:600;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--gold-light);opacity:.75;margin-bottom:10px;
}
.door-glass h2{
  font-family:'Big Shoulders Display',sans-serif;
  font-size:44px;font-weight:900;letter-spacing:-1px;line-height:.95;color:#fff;
}
.door-glass h2 span{color:var(--aqua);font-family:'Big Shoulders Display',sans-serif;}
.glass-header::after{
  content:"";display:block;width:56px;height:2px;
  background:linear-gradient(90deg,var(--aqua),var(--gold));
  border-radius:2px;margin:14px auto 0;
}

/* ── SLIDER ── */
.slider-wrapper{position:relative;display:flex;justify-content:center;}

/* scroll lives on this outer shell — overflow-x:auto only here */
.door-grid-scroll{
  overflow-x:auto;
  overflow-y:visible;
  scroll-behavior:smooth;
  scrollbar-width:none;
  width:100%;
}
.door-grid-scroll::-webkit-scrollbar{display:none;}

/* layout grid has overflow:visible so glows never clip */
.door-grid{
  display:flex;gap:32px;
  overflow:visible;
  /* padding gives first/last card glow full breathing room */
  padding:52px 44px 56px;
  justify-content:center;
  /* must be wider than scroll shell so it can actually scroll */
  width:max-content;
  min-width:100%;
}

/* ── CARD WRAPPER — scale lives HERE, not on the shaped card ── */
.door-card-wrapper{
  position:relative;
  flex-shrink:0;
  width:230px;height:300px;
  transition:transform .55s cubic-bezier(.25,.46,.45,.94);
  cursor:pointer;
  z-index:1;
}
.door-card-wrapper:hover{ transform:scale(1.06); z-index:10; }

/* ── PREMIUM GLOW — large pool of light beneath each card ── */
/* The glow lives on a dedicated element (not ::before) so it can
   extend far outside the wrapper without being clipped */
.card-glow-bg{
  position:absolute;
  /* extend well beyond card edges */
  top:20%;left:50%;
  transform:translateX(-50%);
  width:160%;height:120%;
  border-radius:50%;
  opacity:0;
  transition:opacity .7s ease;
  pointer-events:none;
  z-index:-1;
  /* large blur so edges are totally feathered */
  filter:blur(42px);
}
.door-card-wrapper:hover .card-glow-bg{ opacity:1; }

/* individual colours — warmer, lower saturation = more premium */
.door-card-wrapper:nth-child(1) .card-glow-bg{
  background:radial-gradient(ellipse at 50% 30%, rgba(201,168,76,.28) 0%, rgba(201,168,76,.08) 50%, transparent 75%);
}
.door-card-wrapper:nth-child(2) .card-glow-bg{
  background:radial-gradient(ellipse at 50% 30%, rgba(210,130,155,.26) 0%, rgba(210,130,155,.07) 50%, transparent 75%);
}
.door-card-wrapper:nth-child(3) .card-glow-bg{
  background:radial-gradient(ellipse at 50% 30%, rgba(31,163,177,.26) 0%, rgba(31,163,177,.07) 50%, transparent 75%);
}
.door-card-wrapper:nth-child(4) .card-glow-bg{
  background:radial-gradient(ellipse at 50% 30%, rgba(210,145,60,.26) 0%, rgba(210,145,60,.07) 50%, transparent 75%);
}

/* ── SHAPED CARD — overflow:hidden + border-radius, NO transform ever ── */
.door-card{
  width:100%;height:100%;
  position:relative;
  overflow:hidden;
  /* KEY: will-change:opacity so GPU layer is created WITHOUT transform */
  will-change:opacity;
  box-shadow:0 16px 40px rgba(0,0,0,.6);
  transition:box-shadow .5s ease;
}
/* shapes */
.door-card-wrapper:nth-child(1) .door-card{border-radius:50% 20% 50% 20%;}
.door-card-wrapper:nth-child(2) .door-card{border-radius:30% 50% 20% 50%;}
.door-card-wrapper:nth-child(3) .door-card{border-radius:20% 30% 50% 50%;}
.door-card-wrapper:nth-child(4) .door-card{border-radius:50% 40% 40% 50%;}

.door-card-wrapper:hover .door-card{
  box-shadow:0 28px 60px rgba(31,163,177,.3);
}

/* image — scale via transform is fine here since it's inside overflow:hidden */
.door-card img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .65s ease, filter .5s ease;
  display:block;
}
.door-card-wrapper:hover .door-card img{
  transform:scale(1.08);
}

/* bottom gradient overlay */
.card-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(4,7,13,.9) 0%,rgba(4,7,13,.15) 55%,transparent 100%);
  z-index:1;pointer-events:none;
}

/* inner luminance shimmer — very subtle, just lifts the mid-card slightly */
.card-glow{
  position:absolute;inset:0;z-index:2;
  background:radial-gradient(ellipse at 50% 40%, rgba(255,255,255,.06) 0%, transparent 65%);
  opacity:0;transition:opacity .55s ease;pointer-events:none;
}
.door-card-wrapper:hover .card-glow{opacity:1;}

/* ── DARK SCRIM for Friends/Family ── */
.card-scrim{
  position:absolute;inset:0;z-index:3;
  background:rgba(4,7,13,.6);
  opacity:0;
  transition:opacity .4s ease;
  pointer-events:none;
}

/* ── CARD TEXT ── */
.card-text{
  position:absolute;bottom:22px;
  left:50%;transform:translateX(-50%);
  text-align:center;z-index:4;width:88%;
  transition:opacity .35s ease;
}
.card-label{
  display:block;font-size:9px;font-weight:700;
  letter-spacing:3.5px;text-transform:uppercase;
  color:var(--gold-light);
  opacity:0;transform:translateY(6px);
  transition:.35s ease;margin-bottom:5px;
}
.door-card-wrapper:hover .card-label{opacity:.82;transform:translateY(0);}
.card-name{
  font-family:'Big Shoulders Display',sans-serif;
  font-weight:900;font-size:26px;letter-spacing:-.5px;
  text-shadow:0 4px 12px rgba(0,0,0,.7),0 0 8px rgba(31,163,177,.4);
}

/* ── FRIENDS & FAMILY hover states ── */
.door-card-wrapper.has-picker:hover .card-scrim{ opacity:1; }
.door-card-wrapper.has-picker:hover .card-text{ opacity:0; }
.door-card-wrapper.has-picker:hover .door-card img{ filter:brightness(.62); }

/* ── COUNT PICKER ── */
.count-picker{
  position:absolute;inset:0;z-index:5;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:11px;padding:0 20px;
  opacity:0;
  transition:opacity .38s ease;
  pointer-events:none;
}
.door-card-wrapper.has-picker:hover .count-picker{
  opacity:1;pointer-events:auto;
}

.picker-label{
  font-size:9px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--gold-light);opacity:.8;
}
.picker-name{
  font-family:'Big Shoulders Display',sans-serif;
  font-size:22px;font-weight:900;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.9);
  margin-top:-4px;
}
.picker-rule{
  width:24px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.6;
}
.picker-row{
  display:flex;align-items:center;
  border:1px solid rgba(255,255,255,.2);
  border-radius:4px;overflow:hidden;
  background:rgba(255,255,255,.06);
}
.picker-btn{
  width:36px;height:36px;border:none;background:transparent;
  color:rgba(255,255,255,.75);font-size:18px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;
  touch-action:manipulation;
}
.picker-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.picker-btn:active{background:rgba(31,163,177,.25);color:#fff;}
.picker-divider{width:1px;height:22px;background:rgba(255,255,255,.15);}
.picker-count{
  min-width:38px;
  font-family:'Big Shoulders Display',sans-serif;
  font-size:24px;font-weight:900;
  color:#fff;text-align:center;
  padding:0 4px;user-select:none;line-height:36px;
}
.picker-confirm{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:9px 10px;
  border-radius:4px;
  border:1px solid rgba(201,168,76,.5);
  background:rgba(201,168,76,.1);
  color:var(--gold-light);
  font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;
  transition:background .25s,border-color .25s,color .25s,box-shadow .25s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.picker-confirm:hover,
.picker-confirm:active{
  background:rgba(201,168,76,.25);
  border-color:rgba(201,168,76,.9);
  color:#fff;
  box-shadow:0 0 16px rgba(201,168,76,.2);
}

/* ── ARROWS ── */
.arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(4,7,13,.6);color:rgba(255,255,255,.8);
  font-size:15px;cursor:pointer;backdrop-filter:blur(10px);
  z-index:50;transition:.3s;
  display:flex;align-items:center;justify-content:center;
}
.arrow:hover{
  background:var(--aqua);border-color:var(--aqua);color:#fff;
  box-shadow:0 0 22px rgba(31,163,177,.5);
  transform:translateY(-50%) scale(1.08);
}
.arrow.left{left:10px;display:none;}
.arrow.right{right:10px;}

/* =============================================
   MOBILE RESPONSIVE STYLES — Travellers Page
   Replace the existing @media(max-width:600px)
   block with everything below.
   ============================================= */

/* ── TABLET (max 900px) ── */
@media (max-width: 900px) {
  .navbar {
    padding: 14px 28px;
  }
  .navbar.scrolled {
    padding: 12px 28px;
  }
  .step {
    font-size: 11px;
  }
  .step-connector {
    width: 20px;
  }
  .door-glass {
    width: 94%;
    padding: 36px 28px 40px;
    margin-top: 84px;
  }
  .door-glass h2 {
    font-size: 38px;
  }
  .door-card-wrapper {
    width: 200px;
    height: 270px;
  }
  .door-grid {
    gap: 22px;
    padding: 44px 36px 48px;
  }
}

/* ── MOBILE (max 600px) ── */
@media (max-width: 600px) {

  /* --- NAVBAR --- */
  .navbar {
    padding: 10px 16px 8px;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    justify-content: flex-start;
  }
  .navbar.scrolled {
    padding: 8px 16px 6px;
  }
  .logo {
    position: static;
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .logo-img {
    height: 20px;
  }

  /* --- STEPS --- */
  .trip-steps {
    position: static;
    transform: none;
    width: 100%;
    display: flex;
    overflow-x: auto;
    overflow-y: visible;
    gap: 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
    align-items: center;
  }
  .trip-steps::-webkit-scrollbar {
    display: none;
  }
  .step {
    font-size: 10px;
    white-space: nowrap;
    flex-shrink: 0;
    gap: 5px;
  }
  .step-num {
    width: 17px;
    height: 17px;
    font-size: 8px;
  }
  .step-connector {
    width: 14px;
    flex-shrink: 0;
  }

  /* --- GLASS PANEL --- */
  .door-glass {
    width: 96%;
    padding: 24px 14px 28px;
    margin-top: 95px;
    border-radius: 20px;
  }

  /* --- HEADING --- */
  .glass-eyebrow {
    font-size: 9px;
    letter-spacing: 4px;
  }
  .door-glass h2 {
    font-size: 26px;
    letter-spacing: -0.5px;
  }
  .glass-header {
    margin-bottom: 20px;
  }
  .glass-header::after {
    width: 40px;
    margin-top: 10px;
  }

  /* --- SLIDER GRID --- */
  .door-grid {
    gap: 14px;
    padding: 36px 20px 40px;
    justify-content: flex-start;
  }

  /* --- CARD WRAPPER --- */
  .door-card-wrapper {
    width: 148px;
    height: 210px;
  }

  /* Disable hover scale on touch — no stutter */
  .door-card-wrapper:hover {
    transform: none;
  }

  /* Disable all hover-based picker triggers */
  .door-card-wrapper.has-picker:hover .count-picker {
    opacity: 0;
    pointer-events: none;
  }
  .door-card-wrapper.has-picker:hover .card-scrim {
    opacity: 0;
  }
  .door-card-wrapper.has-picker:hover .card-text {
    opacity: 1;
  }
  .door-card-wrapper.has-picker:hover .door-card img {
    filter: none;
  }

  /* .open class toggled by tap on mobile */
  .door-card-wrapper.open .count-picker {
    opacity: 1 !important;
    pointer-events: auto !important;
  }
  .door-card-wrapper.open .card-scrim {
    opacity: 1 !important;
  }
  .door-card-wrapper.open .card-text {
    opacity: 0 !important;
  }
  .door-card-wrapper.open .door-card img {
    filter: brightness(0.62) !important;
  }

  /* --- CARD TEXT --- */
  .card-name {
    font-size: 18px;
  }
  .card-label {
    font-size: 8px;
    letter-spacing: 2.5px;
  }

  /* --- COUNT PICKER --- */
  .count-picker {
    gap: 9px;
    padding: 0 12px;
  }
  .picker-label {
    font-size: 8px;
    letter-spacing: 2px;
  }
  .picker-name {
    font-size: 17px;
    margin-top: -2px;
  }
  .picker-btn {
    width: 32px;
    height: 32px;
    font-size: 16px;
  }
  .picker-count {
    font-size: 20px;
    min-width: 30px;
    line-height: 32px;
  }
  .picker-confirm {
    font-size: 8px;
    padding: 8px 10px;
    letter-spacing: 1.2px;
  }

  /* --- ARROWS --- */
  .arrow {
    width: 32px;
    height: 32px;
    font-size: 12px;
  }
  .arrow.left {
    left: 3px;
  }
  .arrow.right {
    right: 3px;
  }

  /* --- GLOW disabled on mobile for performance --- */
  .card-glow-bg {
    display: none;
  }
}

/* ── EXTRA SMALL (max 380px) ── */
@media (max-width: 380px) {
  .door-glass {
    padding: 20px 10px 24px;
    margin-top: 98px;
  }
  .door-glass h2 {
    font-size: 22px;
  }
  .door-card-wrapper {
    width: 132px;
    height: 190px;
  }
  .door-grid {
    gap: 12px;
    padding: 30px 14px 34px;
  }
  .step {
    font-size: 9px;
  }
  .step-num {
    width: 15px;
    height: 15px;
    font-size: 7px;
  }
  .step-connector {
    width: 10px;
  }
  .card-name {
    font-size: 16px;
  }
  .picker-name {
    font-size: 15px;
  }
  .picker-btn {
    width: 28px;
    height: 28px;
    font-size: 14px;
  }
  .picker-count {
    font-size: 18px;
    min-width: 26px;
    line-height: 28px;
  }
  .picker-confirm {
    font-size: 7.5px;
    padding: 7px 8px;
  }
}
</style>
</head>
<body>

<div class="navbar" id="navbar">
  <div class="logo">
    <img src="logo.png" class="logo-img">
  </div>
  <div class="trip-steps">
    <span class="step done" onclick="goDestination()">
      <span class="step-num"><i class="fa-solid fa-check" style="font-size:8px;"></i></span>
      Destination
    </span>
    <div class="step-connector done"></div>
    <span class="step active">
      <span class="step-num">2</span>
      Travellers
    </span>
    <div class="step-connector"></div>
    <span class="step"><span class="step-num">3</span>Duration</span>
    <div class="step-connector"></div>
    <span class="step"><span class="step-num">4</span>Departure city</span>
    <div class="step-connector"></div>
    <span class="step"><span class="step-num">5</span>Departure date</span>
  </div>
  <div style="width:28px;"></div>
</div>

<section class="door-section">
  <video autoplay muted loop id="bgVideo">
    <source src="details2-bg.mp4" type="video/mp4">
  </video>
  <div class="door-overlay"></div>

  <div class="door-glass">
    <div class="glass-header">
      <span class="glass-eyebrow">Step 2 of 5</span>
      <h2>Select your <span>Travel type</span></h2>
    </div>

    <div class="slider-wrapper">
      <button class="arrow left" id="leftArrow" onclick="slideLeft()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <button class="arrow right" id="rightArrow" onclick="slideRight()">
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="door-grid-scroll" id="sliderScroll">
      <div class="door-grid" id="slider">

        <!-- SOLO -->
        <div class="door-card-wrapper" onclick="goNext('Solo',1)">
          <div class="card-glow-bg"></div>
          <div class="door-card">
            <img src="https://images.unsplash.com/photo-1583838812711-91e66580f5e1?w=500&auto=format&fit=crop&q=60" alt="Solo">
            <div class="card-gradient"></div>
            <div class="card-glow"></div>
            <div class="card-text">
              <span class="card-label">Travel style</span>
              <div class="card-name">Solo</div>
            </div>
          </div>
        </div>

        <!-- COUPLE -->
        <div class="door-card-wrapper" onclick="goNext('Couple',2)">
          <div class="card-glow-bg"></div>
          <div class="door-card">
            <img src="https://plus.unsplash.com/premium_photo-1723795353299-c092a315206d?q=80&w=387&auto=format&fit=crop" alt="Couple">
            <div class="card-gradient"></div>
            <div class="card-glow"></div>
            <div class="card-text">
              <span class="card-label">Travel style</span>
              <div class="card-name">Couple</div>
            </div>
          </div>
        </div>

        <!-- FRIENDS -->
        <div class="door-card-wrapper has-picker" id="friendsWrapper">
          <div class="card-glow-bg"></div>
          <div class="door-card">
            <img src="https://images.unsplash.com/photo-1701688992044-7c58b09effa5?w=500&auto=format&fit=crop&q=60" alt="Friends">
            <div class="card-gradient"></div>
            <div class="card-glow"></div>
            <div class="card-scrim"></div>
            <div class="card-text">
              <span class="card-label">Travel style</span>
              <div class="card-name">Friends</div>
            </div>
            <div class="count-picker">
              <span class="picker-label">How many?</span>
              <div class="picker-name">Friends</div>
              <div class="picker-rule"></div>
              <div class="picker-row">
                <button class="picker-btn" onclick="changeCount('friends',-1,event)">−</button>
                <div class="picker-divider"></div>
                <div class="picker-count" id="friendsCount">3</div>
                <div class="picker-divider"></div>
                <button class="picker-btn" onclick="changeCount('friends',1,event)">+</button>
              </div>
              <button class="picker-confirm" onclick="confirmCount('Friends',event)">
                Confirm &amp; Continue &nbsp;<i class="fa-solid fa-arrow-right" style="font-size:8px;"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- FAMILY -->
        <div class="door-card-wrapper has-picker" id="familyWrapper">
          <div class="card-glow-bg"></div>
          <div class="door-card">
            <img src="https://plus.unsplash.com/premium_photo-1676517028814-77940b84c6be?w=500&auto=format&fit=crop&q=60" alt="Family">
            <div class="card-gradient"></div>
            <div class="card-glow"></div>
            <div class="card-scrim"></div>
            <div class="card-text">
              <span class="card-label">Travel style</span>
              <div class="card-name">Family</div>
            </div>
            <div class="count-picker">
              <span class="picker-label">How many?</span>
              <div class="picker-name">Family</div>
              <div class="picker-rule"></div>
              <div class="picker-row">
                <button class="picker-btn" onclick="changeCount('family',-1,event)">−</button>
                <div class="picker-divider"></div>
                <div class="picker-count" id="familyCount">3</div>
                <div class="picker-divider"></div>
                <button class="picker-btn" onclick="changeCount('family',1,event)">+</button>
              </div>
              <button class="picker-confirm" onclick="confirmCount('Family',event)">
                Confirm &amp; Continue &nbsp;<i class="fa-solid fa-arrow-right" style="font-size:8px;"></i>
              </button>
            </div>
          </div>
        </div>

      </div>
      </div><!-- /door-grid-scroll -->
    </div>
  </div>
</section>

<script>
const counts = { friends:3, family:3 };

function changeCount(type, delta, e){
  e.stopPropagation();
  counts[type] = Math.min(20, Math.max(2, counts[type] + delta));
  document.getElementById(type + 'Count').textContent = counts[type];
}

function confirmCount(type, e){
  e.stopPropagation();
  goNext(type, type === 'Friends' ? counts.friends : counts.family);
}

function goNext(type, count){
  localStorage.setItem('travellerType', type);
  localStorage.setItem('travellerCount', count);
  window.location.href = 'duration.html';
}

function goDestination(){
  window.location.href = 'details-one.html';
}

/* ── Mobile tap-to-open picker ── */
const pickerWrappers = document.querySelectorAll('.has-picker');

pickerWrappers.forEach(wrapper => {
  wrapper.addEventListener('click', function(e){
    // only intercept on mobile
    if(window.innerWidth > 600) return;
    // if tapping a button inside picker, let it go
    if(e.target.closest('.count-picker')) return;
    e.stopPropagation();
    const isOpen = this.classList.contains('open');
    // close all
    pickerWrappers.forEach(w => w.classList.remove('open'));
    // open this one if it wasn't already
    if(!isOpen) this.classList.add('open');
  });
});

// tap outside closes
document.addEventListener('click', function(e){
  if(window.innerWidth > 600) return;
  if(!e.target.closest('.has-picker')){
    pickerWrappers.forEach(w => w.classList.remove('open'));
  }
});

/* ── Slider ── */
const slider    = document.getElementById('sliderScroll');
const leftArrow = document.getElementById('leftArrow');
const rightArrow= document.getElementById('rightArrow');

function updateArrows(){
  const max = slider.scrollWidth - slider.clientWidth;
  leftArrow.style.display  = slider.scrollLeft <= 8       ? 'none' : 'flex';
  rightArrow.style.display = slider.scrollLeft >= max - 8 ? 'none' : 'flex';
}
function slideLeft(){  slider.scrollBy({left: window.innerWidth <= 600 ? -180 : -270, behavior:'smooth'}); }
function slideRight(){ slider.scrollBy({left: window.innerWidth <= 600 ?  180 :  270, behavior:'smooth'}); }

slider.addEventListener('scroll', updateArrows);
window.addEventListener('resize', updateArrows);
updateArrows();

/* ── Scrolled navbar ── */
window.addEventListener('scroll', ()=>{
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});
</script>
</body>
</html>
