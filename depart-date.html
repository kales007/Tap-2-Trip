<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departure Date — Tap to Trip</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --aqua:#1FA3B1; --aqua-light:#38c5d5; --aqua-glow:rgba(31,163,177,.4);
  --gold:#C9A84C; --gold-light:#e8c97e;
  --cream:#F8F0E3; --dark:#04070D;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
html,body{overflow:hidden;width:100%;height:100%;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--aqua),var(--gold));border-radius:10px;}

body{background:var(--dark);color:white;overflow-x:hidden;}

/* grain */
body::after{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:99990;opacity:.35;
}

/* ── NAVBAR ── */
.navbar{
  position:fixed;width:100%;top:0;left:0;z-index:1000;
  padding:18px 60px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(4,7,13,.18);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 1px 0 rgba(255,255,255,.05);
  transition:.4s ease;
}
.navbar.scrolled{
  background:rgba(4,7,13,.82);
  backdrop-filter:blur(24px);
  box-shadow:0 8px 40px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.04);
  padding:14px 60px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.logo-img{
  height:26px;width:auto;
  filter:drop-shadow(0 0 10px rgba(31,163,177,.5));
  transition:.3s;
}
.logo-img:hover{filter:drop-shadow(0 0 20px rgba(31,163,177,.9));transform:scale(1.04);}

/* ── PROGRESS STEPS ── */
.trip-steps{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;gap:0;align-items:center;
  font-family:'Outfit',sans-serif;letter-spacing:.5px;white-space:nowrap;
}
.step{
  font-size:12px;font-weight:500;color:rgba(255,255,255,.4);
  letter-spacing:.5px;cursor:pointer;transition:.3s;
  padding:6px 0;display:flex;align-items:center;gap:8px;
}
.step-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;transition:.3s;flex-shrink:0;
}
.step.done .step-num{background:rgba(201,168,76,.18);border-color:rgba(201,168,76,.5);color:var(--gold-light);}
.step.done{color:rgba(255,255,255,.45);}
.step.active .step-num{background:var(--aqua);border-color:var(--aqua);box-shadow:0 0 14px rgba(31,163,177,.55);color:#fff;}
.step.active{color:#fff;font-weight:600;}
.step:hover:not(.active):not(.done){color:rgba(255,255,255,.7);}
.step-connector{
  width:32px;height:1px;background:rgba(255,255,255,.12);
  margin:0 4px;flex-shrink:0;position:relative;overflow:hidden;
}
.step-connector::after{
  content:"";position:absolute;left:0;top:0;height:100%;width:0%;
  background:linear-gradient(90deg,var(--aqua),var(--gold));transition:.5s ease;
}
.step-connector.done::after{width:100%;}

/* ── SECTION ── */
.door-section{
  position:relative;height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.door-video{
  position:absolute;width:100%;height:100%;
  object-fit:cover;z-index:-2;
}
.door-overlay{
  position:absolute;inset:0;z-index:-1;
  background:linear-gradient(135deg,rgba(4,7,13,.75) 0%,rgba(4,7,13,.55) 50%,rgba(4,7,13,.72) 100%);
}

/* ── GLASS CARD ── */
.door-glass{
  width:95%;max-width:1500px;
  padding:50px 36px;
  border-radius:30px;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 0 .5px rgba(255,255,255,.05) inset,0 30px 80px rgba(0,0,0,.65);
  text-align:center;
  margin-top:80px;
  position:relative;
}
.door-glass::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:30%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* ── HEADING ── */
.glass-header{text-align:center;margin-bottom:32px;}
.glass-eyebrow{
  display:block;font-size:10px;font-weight:600;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--gold-light);opacity:.75;margin-bottom:10px;
}
.door-glass h2{
  font-family:'Big Shoulders Display',sans-serif;
  font-size:44px;font-weight:900;letter-spacing:-1px;line-height:.95;color:#fff;
}
.door-glass h2 span{
  color:var(--aqua);font-family:'Big Shoulders Display',sans-serif;
  text-shadow:0 0 30px rgba(31,163,177,.3);
}
.glass-header::after{
  content:"";display:block;width:56px;height:2px;
  background:linear-gradient(90deg,var(--aqua),var(--gold));
  border-radius:2px;margin:14px auto 0;
}

/* ── MONTHS WRAPPER ── */
.months-wrapper{
  display:flex;align-items:center;
  justify-content:center;
  gap:14px;margin-top:10px;
}
.nav-btn{
  width:44px;height:44px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(4,7,13,.65);
  color:rgba(255,255,255,.8);
  font-size:15px;cursor:pointer;
  backdrop-filter:blur(10px);z-index:10;
  transition:.3s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.nav-btn:hover{
  background:var(--aqua);border-color:var(--aqua);color:#fff;
  box-shadow:0 0 22px rgba(31,163,177,.5);
  transform:scale(1.08);
}
.nav-btn:disabled{
  opacity:.25;cursor:not-allowed;pointer-events:none;
}

/* ── MONTHS GRID ── */
.months{display:flex;gap:20px;justify-content:center;flex-wrap:nowrap;}

/* ── MONTH CARD ── */
.month{
  background:rgba(0,0,0,.35);padding:24px;
  border-radius:20px;width:390px;flex:0 0 390px;
  overflow:hidden;border:1px solid rgba(255,255,255,.06);
}
.month h3{
  margin-bottom:16px;color:var(--aqua);
  font-family:'Big Shoulders Display',sans-serif;
  font-size:20px;font-weight:800;letter-spacing:.5px;
}
.days{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:6px;font-size:11px;width:100%;margin-bottom:8px;
}
.days div{
  opacity:.45;font-size:11px;text-align:center;
  font-family:'Outfit',sans-serif;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
}
.dates{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:6px;font-size:14px;width:100%;
}
.date{
  padding:11px 6px;border-radius:10px;cursor:pointer;
  transition:.22s ease;font-family:'DM Sans',sans-serif;
  font-weight:600;letter-spacing:.3px;
  background:rgba(255,255,255,.04);
  text-align:center;border:1px solid transparent;
}
.date:hover{
  background:var(--aqua);color:#04070D;
  border-color:var(--aqua);transform:scale(1.08);
}
.disabled{opacity:.18;pointer-events:none;}
.selected{
  background:var(--aqua);color:#04070D;
  border-color:var(--aqua);box-shadow:0 0 14px rgba(31,163,177,.4);
}

/* ── POPUP ── */
.popup-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  z-index:2000;
}
.popup-box{
  width:90%;max-width:360px;padding:36px 32px;
  border-radius:24px;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  text-align:center;position:relative;
  box-shadow:0 0 50px rgba(0,0,0,.7);
}
.popup-box::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.popup-box h3{
  font-family:'Big Shoulders Display',sans-serif;
  font-size:28px;font-weight:900;
  margin-bottom:8px;letter-spacing:-.5px;
}
.popup-box p{opacity:.6;margin-bottom:24px;font-size:13px;line-height:1.6;}
.popup-btn{
  width:100%;padding:14px;margin:6px 0;border:none;
  border-radius:50px;cursor:pointer;
  font-family:'Outfit',sans-serif;
  font-weight:700;font-size:14px;letter-spacing:.5px;transition:.25s;
}
.login-btn{
  background:var(--aqua);color:#04070D;
  box-shadow:0 0 20px rgba(31,163,177,.35);
}
.login-btn:hover{
  background:var(--aqua-light);
  box-shadow:0 0 30px rgba(31,163,177,.55);transform:scale(1.02);
}
.signup-btn{
  background:rgba(255,255,255,.08);color:white;
  border:1px solid rgba(255,255,255,.15);
}
.signup-btn:hover{background:rgba(255,255,255,.14);transform:scale(1.02);}
.close-popup{
  position:absolute;top:14px;right:18px;
  cursor:pointer;font-size:16px;
  opacity:.5;transition:.2s;
}
.close-popup:hover{opacity:1;}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  /* Navbar stacks vertically */
  .navbar{
    padding:12px 20px 10px;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .navbar.scrolled{
    padding:10px 20px 8px;
  }
  .logo{width:100%;display:flex;justify-content:center;}
  .logo-img{height:22px;}

  /* Steps scroll horizontally */
  .trip-steps{
    position:static;
    transform:none;
    width:100%;
    overflow-x:auto;
    overflow-y:visible;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    padding-bottom:2px;
    justify-content:flex-start;
  }
  .trip-steps::-webkit-scrollbar{display:none;}
  .step{font-size:10px;white-space:nowrap;flex-shrink:0;padding:4px 0;}
  .step-num{width:18px;height:18px;font-size:8px;}
  .step-connector{width:18px;margin:0 2px;}

  /* Card adjustments */
  .door-glass{
    padding:24px 16px 28px;
    margin-top:80px;
    border-radius:22px;
    width:96%;
  }
  .door-glass h2{font-size:28px;}
  .glass-eyebrow{font-size:9px;letter-spacing:4px;}
  .glass-header{margin-bottom:20px;}

  /* Months wrapper — single month layout */
  .months-wrapper{
    gap:10px;
  }

  /* Single month fills available width */
  .months{
    flex:1;
    min-width:0;
    gap:0;
  }
  .month{
    width:100%;
    flex:1 1 100%;
    padding:18px 14px;
    border-radius:16px;
    min-width:0;
  }
  .month h3{
    font-size:18px;
    margin-bottom:12px;
  }

  /* Slightly larger touch targets for dates */
  .date{
    padding:10px 4px;
    font-size:13px;
    border-radius:8px;
  }
  .days div{
    font-size:10px;
  }
  .days{gap:4px;}
  .dates{gap:4px;}

  /* Slightly smaller nav buttons on mobile */
  .nav-btn{
    width:38px;height:38px;font-size:13px;
    flex-shrink:0;
  }
}

@media(max-width:380px){
    .door-glass{
    margin-top:85px;
  }
  .door-glass h2{font-size:24px;}
  .date{padding:9px 2px;font-size:12px;}
  .days div{font-size:9px;letter-spacing:.5px;}
  .month{padding:14px 10px;}
  .nav-btn{width:34px;height:34px;font-size:12px;}
}
</style>
</head>

<body>

<div class="navbar" id="navbar">
  <div class="logo"><img src="logo.png" class="logo-img"></div>

  <div class="trip-steps">
    <span class="step done" onclick="goDestination()">
      <span class="step-num"><i class="fa-solid fa-check" style="font-size:8px;"></i></span>
      Destination
    </span>
    <div class="step-connector done"></div>
    <span class="step done" onclick="goTravellers()">
      <span class="step-num"><i class="fa-solid fa-check" style="font-size:8px;"></i></span>
      Travellers
    </span>
    <div class="step-connector done"></div>
    <span class="step done" onclick="goDuration()">
      <span class="step-num"><i class="fa-solid fa-check" style="font-size:8px;"></i></span>
      Duration
    </span>
    <div class="step-connector done"></div>
    <span class="step done" onclick="goDepartureCity()">
      <span class="step-num"><i class="fa-solid fa-check" style="font-size:8px;"></i></span>
      Departure city
    </span>
    <div class="step-connector done"></div>
    <span class="step active">
      <span class="step-num">5</span>
      Departure date
    </span>
  </div>

  <div style="width:26px;"></div>
</div>

<section class="door-section">
  <video autoplay muted loop class="door-video">
    <source src="login-bg.mp4" type="video/mp4">
  </video>
  <div class="door-overlay"></div>

  <div class="door-glass">
    <div class="glass-header">
      <span class="glass-eyebrow">Step 5 of 5</span>
      <h2>Select <span>Departure date</span></h2>
    </div>

    <div class="months-wrapper">
      <button class="nav-btn" id="prevBtn" onclick="prevMonths()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <div class="months" id="monthsContainer"></div>
      <button class="nav-btn" id="nextBtn" onclick="nextMonths()">
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
  </div>
</section>

<!-- POPUP -->
<div id="loginPopup" class="popup-overlay">
  <div class="popup-box">
    <span class="close-popup" onclick="closePopup()">✕</span>
    <h3>Continue</h3>
    <p>Please login to save your trip</p>
    <button class="popup-btn login-btn" onclick="goLogin()">Login</button>
  </div>
</div>

<script>
const container = document.getElementById("monthsContainer");
const prevBtn   = document.getElementById("prevBtn");
const nextBtn   = document.getElementById("nextBtn");
const today     = new Date();
const todayYear = today.getFullYear();
const todayMonthIndex = today.getMonth(); // 0-based, current month

// Total months we allow navigation: current month + remaining months of year
// We store startMonth as absolute index: 0 = Jan of current year
let startMonth  = todayMonthIndex; // start at current month
const maxMonth  = 11; // December

function isMobile(){
  return window.innerWidth <= 768;
}

function getMonthsPerView(){
  return isMobile() ? 1 : 3;
}

function updateNavButtons(){
  const step = getMonthsPerView();
  // Disable prev if already at the earliest allowed month
  prevBtn.disabled = startMonth <= todayMonthIndex;
  // Disable next if showing the last month(s) already
  nextBtn.disabled = startMonth + step > maxMonth;
}

function renderMonths(){
  container.innerHTML = "";
  const monthsToShow = getMonthsPerView();

  for(let m = 0; m < monthsToShow; m++){
    const monthIndex = startMonth + m;
    if(monthIndex > maxMonth) break;

    const monthDiv = document.createElement("div");
    monthDiv.className = "month";
    monthDiv.innerHTML = `<h3>${new Date(todayYear, monthIndex).toLocaleString('default',{month:'long'})} ${todayYear}</h3>`;

    const days = document.createElement("div");
    days.className = "days";
    ["S","M","T","W","T","F","S"].forEach(d => {
      const span = document.createElement("div");
      span.textContent = d;
      days.appendChild(span);
    });

    const dates = document.createElement("div");
    dates.className = "dates";

    const firstDay = new Date(todayYear, monthIndex, 1).getDay();
    for(let i = 0; i < firstDay; i++){
      dates.innerHTML += `<div></div>`;
    }

    const totalDays = new Date(todayYear, monthIndex + 1, 0).getDate();
    const todayMidnight = new Date();
    todayMidnight.setHours(0,0,0,0);

    for(let d = 1; d <= totalDays; d++){
      const dateObj = new Date(todayYear, monthIndex, d);
      let cls = "date";
      if(dateObj < todayMidnight) cls += " disabled";

      const dateKey = `${todayYear}-${monthIndex+1}-${d}`;
      const el = document.createElement("div");
      el.className = cls;
      el.textContent = d;
      el.setAttribute("data-date", dateKey);
      el.addEventListener("click", function(){
        selectDate(dateKey, this);
      });
      dates.appendChild(el);
    }

    monthDiv.appendChild(days);
    monthDiv.appendChild(dates);
    container.appendChild(monthDiv);
  }

  updateNavButtons();
}

function nextMonths(){
  const step = getMonthsPerView();
  if(startMonth + step <= maxMonth){
    startMonth += step;
    renderMonths();
  }
}

function prevMonths(){
  const step = getMonthsPerView();
  if(startMonth - step >= todayMonthIndex){
    startMonth -= step;
    renderMonths();
  }
}

function selectDate(date, el){
  document.querySelectorAll('.date').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  localStorage.setItem("departureDate", date);
  openPopup();
}

renderMonths();
window.addEventListener("resize", renderMonths);

window.addEventListener('scroll', ()=>{
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});

function openPopup(){  document.getElementById("loginPopup").style.display = "flex"; }
function closePopup(){ document.getElementById("loginPopup").style.display = "none"; }
function goLogin(){    window.location.href = "login.html"; }

function goDestination(){   window.location.href = "details-one.html"; }
function goTravellers(){    window.location.href = "travellers.html"; }
function goDuration(){      window.location.href = "duration.html"; }
function goDepartureCity(){ window.location.href = "depart-city.html"; }
</script>

</body>
</html>
