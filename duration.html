<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duration — Tap to Trip</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --aqua:#1FA3B1; --aqua-light:#38c5d5;
  --gold:#C9A84C; --gold-light:#e8c97e;
  --dark:#04070D;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
html,body{overflow-x:hidden;width:100%;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--aqua),var(--gold));border-radius:10px;}
body{background:var(--dark);color:white;overflow-x:hidden;opacity:0;transition:opacity .4s ease;}
body.loaded{opacity:1;}
body::after{
  content:"";position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:99990;opacity:.35;
}

/* ── NAVBAR ── */
.navbar{
  position:fixed;width:100%;top:0;left:0;z-index:1000;
  padding:18px 60px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(4,7,13,.18);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 1px 0 rgba(255,255,255,.05);
  transition:.4s ease;
}
.navbar.scrolled{
  background:rgba(4,7,13,.82);
  backdrop-filter:blur(24px);
  box-shadow:0 8px 40px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.04);
  padding:14px 60px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.logo-img{
  height:26px;width:auto;
  filter:drop-shadow(0 0 10px rgba(31,163,177,.5));
  transition:.3s;
}
.logo-img:hover{filter:drop-shadow(0 0 20px rgba(31,163,177,.9));transform:scale(1.04);}

/* ── PROGRESS STEPS ── */
.trip-steps{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;gap:0;align-items:center;white-space:nowrap;
}
.step{
  font-size:12px;font-weight:500;color:rgba(255,255,255,.4);
  letter-spacing:.5px;cursor:pointer;transition:.3s;
  padding:6px 0;display:flex;align-items:center;gap:8px;
}
.step-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;transition:.3s;flex-shrink:0;
}
.step.done .step-num{background:rgba(201,168,76,.18);border-color:rgba(201,168,76,.5);color:var(--gold-light);}
.step.done{color:rgba(255,255,255,.45);}
.step.active .step-num{background:var(--aqua);border-color:var(--aqua);box-shadow:0 0 14px rgba(31,163,177,.55);color:#fff;}
.step.active{color:#fff;font-weight:600;}
.step:hover:not(.active):not(.done){color:rgba(255,255,255,.7);}
.step-connector{
  width:32px;height:1px;background:rgba(255,255,255,.12);
  margin:0 4px;flex-shrink:0;position:relative;overflow:hidden;
}
.step-connector::after{
  content:"";position:absolute;left:0;top:0;height:100%;width:0%;
  background:linear-gradient(90deg,var(--aqua),var(--gold));transition:.5s ease;
}
.step-connector.done::after{width:100%;}

/* ── SECTION ── */
.door-section{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.door-video{
  position:absolute;width:100%;height:100%;
  object-fit:cover;z-index:-2;
}
.door-overlay{
  position:absolute;inset:0;z-index:-1;
  background:linear-gradient(135deg,rgba(4,7,13,.75) 0%,rgba(4,7,13,.55) 50%,rgba(4,7,13,.72) 100%);
}

/* ── GLASS PANEL ── */
.door-glass{
  width:90%;max-width:1100px;
  padding:44px 40px 48px;
  border-radius:28px;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 0 .5px rgba(255,255,255,.05) inset,0 30px 80px rgba(0,0,0,.65);
  animation:glassFloat 8s ease-in-out infinite;
  text-align:center;margin-top:80px;position:relative;
}
.door-glass::before{
  content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:30%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
@keyframes glassFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

.glass-header{text-align:center;margin-bottom:44px;}
.glass-eyebrow{
  display:block;font-size:10px;font-weight:600;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--gold-light);opacity:.75;margin-bottom:10px;
}
.door-glass h2{
  font-family:'Big Shoulders Display',sans-serif;
  font-size:44px;font-weight:900;letter-spacing:-1px;line-height:.95;color:#fff;
}
.door-glass h2 span{
  color:var(--aqua);font-family:'Big Shoulders Display',sans-serif;
  text-shadow:0 0 30px rgba(31,163,177,.3);
}
.glass-header::after{
  content:"";display:block;width:56px;height:2px;
  background:linear-gradient(90deg,var(--aqua),var(--gold));
  border-radius:2px;margin:14px auto 0;
}

/* ── SLIDER ── */
.slider-wrapper{position:relative;display:flex;justify-content:center;}
.door-grid-scroll{
  overflow-x:auto;overflow-y:visible;
  scroll-behavior:smooth;scrollbar-width:none;width:100%;
}
.door-grid-scroll::-webkit-scrollbar{display:none;}
.door-grid{
  display:flex;gap:32px;overflow:visible;
  padding:48px 44px 52px;
  justify-content:center;
  width:max-content;min-width:100%;
}

/* ── CARD WRAPPER ── */
.door-card-wrapper{
  position:relative;flex-shrink:0;
  width:220px;height:220px;
  cursor:pointer;z-index:1;
  transition:transform .5s cubic-bezier(.25,.46,.45,.94);
}
.door-card-wrapper:hover{transform:scale(1.06);z-index:10;}

/* glow bg element */
.card-glow-bg{
  position:absolute;top:15%;left:50%;
  transform:translateX(-50%);
  width:160%;height:130%;
  border-radius:50%;opacity:0;
  transition:opacity .7s ease;
  pointer-events:none;z-index:-1;
  filter:blur(40px);
}
.door-card-wrapper:hover .card-glow-bg{opacity:1;}
.door-card-wrapper:nth-child(1) .card-glow-bg{background:radial-gradient(ellipse at 50% 30%,rgba(201,168,76,.26) 0%,rgba(201,168,76,.07) 50%,transparent 75%);}
.door-card-wrapper:nth-child(2) .card-glow-bg{background:radial-gradient(ellipse at 50% 30%,rgba(31,163,177,.26) 0%,rgba(31,163,177,.07) 50%,transparent 75%);}
.door-card-wrapper:nth-child(3) .card-glow-bg{background:radial-gradient(ellipse at 50% 30%,rgba(201,168,76,.26) 0%,rgba(201,168,76,.07) 50%,transparent 75%);}
.door-card-wrapper:nth-child(4) .card-glow-bg{background:radial-gradient(ellipse at 50% 30%,rgba(31,163,177,.26) 0%,rgba(31,163,177,.07) 50%,transparent 75%);}

/* ── CARD ── */
.door-card{
  width:100%;height:100%;
  border-radius:inherit;
  overflow:visible;
  padding-top:12px;
  position:relative;
  /* no transform — wrapper handles scale */
}

.door-card img{
  width:100%;height:130px;
  object-fit:contain;
  transition:transform .6s ease, filter .4s ease;
  transform:translateY(-8px);
}
.door-card-wrapper:hover .door-card img{
  transform:translateY(-8px) scale(1.06);
  filter:drop-shadow(0 0 18px rgba(31,163,177,.45));
}

.card-text{
  position:absolute;bottom:14px;
  left:50%;transform:translateX(-50%);
  text-align:center;z-index:2;width:90%;color:white;
}
.card-label{
  display:block;font-size:9px;font-weight:700;
  letter-spacing:3.5px;text-transform:uppercase;
  color:var(--gold-light);
  opacity:0;transform:translateY(5px);transition:.35s ease;
  margin-bottom:4px;
}
.door-card-wrapper:hover .card-label{opacity:.78;transform:translateY(0);}
.card-text .name{
  font-family:'Big Shoulders Display',sans-serif;
  font-weight:900;font-size:22px;letter-spacing:-.5px;
  text-shadow:0 4px 12px rgba(0,0,0,.7),0 0 8px rgba(31,163,177,.4);
}

/* selected flash */
.door-card-wrapper.selected{
  filter:drop-shadow(0 0 25px rgba(31,163,177,.8));
}

/* ── 4–5 DAY COMBO CARD ── */
/* The card shows "4 – 5 Days" as label
   On hover a minimal toggle slides up to pick 4 or 5 */
.combo-toggle{
  position:absolute;
  bottom:10px;left:50%;transform:translateX(-50%);
  z-index:5;
  display:flex;align-items:center;gap:0;
  border:1px solid rgba(255,255,255,.2);
  border-radius:4px;overflow:hidden;
  background:rgba(4,7,13,.55);
  backdrop-filter:blur(10px);
  opacity:0;
  transition:opacity .35s ease;
  pointer-events:none;
  white-space:nowrap;
}
.door-card-wrapper:hover .combo-toggle{
  opacity:1;pointer-events:auto;
}
/* on mobile show via .open class */

.combo-btn{
  padding:7px 14px;
  border:none;background:transparent;
  color:rgba(255,255,255,.6);
  font-family:'Outfit',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;
  transition:background .2s,color .2s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.combo-btn:hover,.combo-btn:active{
  background:rgba(201,168,76,.2);
  color:var(--gold-light);
}
.combo-sep{
  width:1px;height:18px;
  background:rgba(255,255,255,.15);
  flex-shrink:0;
}

/* hide name when toggle is visible so there's room */
.door-card-wrapper.combo-card:hover .card-text .name{
  opacity:0;transition:opacity .2s;
}
/* keep label visible */
.door-card-wrapper.combo-card:hover .card-label{opacity:.78;}

/* mobile open state */
.door-card-wrapper.open .combo-toggle{opacity:1 !important;pointer-events:auto !important;}
.door-card-wrapper.open .card-text .name{opacity:0;}

/* ── ARROWS ── */
.arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(4,7,13,.6);color:rgba(255,255,255,.8);
  font-size:14px;cursor:pointer;
  backdrop-filter:blur(10px);z-index:50;transition:.3s;
  display:flex;align-items:center;justify-content:center;
}
.arrow:hover{
  background:var(--aqua);border-color:var(--aqua);color:#fff;
  box-shadow:0 0 22px rgba(31,163,177,.5);
  transform:translateY(-50%) scale(1.08);
}
.arrow.left{left:10px;display:none;}
.arrow.right{right:10px;}

/* =============================================
   MOBILE RESPONSIVE STYLES — Duration Page
   Replace the existing @media(max-width:600px)
   block with everything below.
   ============================================= */

/* ── TABLET (max 900px) ── */
@media (max-width: 900px) {
  .navbar {
    padding: 14px 28px;
  }
  .navbar.scrolled {
    padding: 12px 28px;
  }
  .step {
    font-size: 11px;
  }
  .step-connector {
    width: 20px;
  }
  .door-glass {
    width: 94%;
    padding: 36px 28px 40px;
    margin-top: 84px;
  }
  .door-glass h2 {
    font-size: 38px;
  }
  .door-card-wrapper {
    width: 190px;
    height: 190px;
  }
  .door-card img {
    height: 115px;
  }
  .door-grid {
    gap: 22px;
    padding: 40px 36px 44px;
  }
}

/* ── MOBILE (max 600px) ── */
@media (max-width: 600px) {

  /* --- NAVBAR --- */
  .navbar {
    padding: 10px 16px 8px;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    justify-content: flex-start;
  }
  .navbar.scrolled {
    padding: 8px 16px 6px;
  }
  .logo {
    position: static;
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .logo-img {
    height: 20px;
  }

  /* --- STEPS --- */
  .trip-steps {
    position: static;
    transform: none;
    width: 100%;
    display: flex;
    overflow-x: auto;
    overflow-y: visible;
    gap: 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
    align-items: center;
  }
  .trip-steps::-webkit-scrollbar {
    display: none;
  }
  .step {
    font-size: 10px;
    white-space: nowrap;
    flex-shrink: 0;
    gap: 5px;
  }
  .step-num {
    width: 17px;
    height: 17px;
    font-size: 8px;
  }
  .step-connector {
    width: 14px;
    flex-shrink: 0;
  }

  /* --- GLASS PANEL --- */
  .door-glass {
    width: 96%;
    padding: 24px 14px 28px;
    margin-top: 95px;
    border-radius: 20px;
  }

  /* --- HEADING --- */
  .glass-eyebrow {
    font-size: 9px;
    letter-spacing: 4px;
  }
  .door-glass h2 {
    font-size: 26px;
    letter-spacing: -0.5px;
  }
  .glass-header {
    margin-bottom: 20px;
  }
  .glass-header::after {
    width: 40px;
    margin-top: 10px;
  }

  /* --- SLIDER GRID --- */
  .door-grid {
    gap: 14px;
    padding: 36px 20px 40px;
    justify-content: flex-start;
  }

  /* --- CARD WRAPPER --- */
  .door-card-wrapper {
    width: 155px;
    height: 155px;
  }

  /* Disable hover scale on touch */
  .door-card-wrapper:hover {
    transform: none;
  }

  /* Disable glow on mobile for performance */
  .card-glow-bg {
    display: none;
  }

  /* --- CARD IMAGE --- */
  .door-card img {
    height: 90px;
    transform: translateY(-6px);
  }
  .door-card-wrapper:hover .door-card img {
    transform: translateY(-6px) scale(1);
    filter: none;
  }

  /* --- CARD TEXT --- */
  .card-text .name {
    font-size: 17px;
  }
  .card-label {
    font-size: 8px;
    letter-spacing: 2.5px;
  }

  /* --- COMBO TOGGLE --- */
  /* Disable hover-based show on mobile */
  .door-card-wrapper.combo-card:hover .combo-toggle {
    opacity: 0;
    pointer-events: none;
  }
  .door-card-wrapper.combo-card:hover .card-text .name {
    opacity: 1;
  }

  /* .open class toggled by tap */
  .door-card-wrapper.open .combo-toggle {
    opacity: 1 !important;
    pointer-events: auto !important;
  }
  .door-card-wrapper.open .card-text .name {
    opacity: 0 !important;
  }
  .door-card-wrapper.open .card-label {
    opacity: 0.78 !important;
  }

  .combo-toggle {
    bottom: 8px;
  }
  .combo-btn {
    padding: 8px 12px;
    font-size: 9.5px;
  }

  /* --- ARROWS --- */
  .arrow {
    width: 32px;
    height: 32px;
    font-size: 12px;
  }
  .arrow.left {
    left: 3px;
  }
  .arrow.right {
    right: 3px;
  }
}

/* ── EXTRA SMALL (max 380px) ── */
@media (max-width: 380px) {
  .door-glass {
    padding: 20px 10px 24px;
    margin-top: 98px;
  }
  .door-glass h2 {
    font-size: 22px;
  }
  .door-card-wrapper {
    width: 136px;
    height: 136px;
  }
  .door-grid {
    gap: 12px;
    padding: 28px 14px 32px;
  }
  .door-card img {
    height: 78px;
  }
  .card-text .name {
    font-size: 15px;
  }
  .step {
    font-size: 9px;
  }
  .step-num {
    width: 15px;
    height: 15px;
    font-size: 7px;
  }
  .step-connector {
    width: 10px;
  }
  .combo-btn {
    padding: 7px 10px;
    font-size: 9px;
  }
}d
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
  <div class="logo">
    <img src="logo.png" class="logo-img">
  </div>
  <div class="trip-steps">
    <span class="step done" onclick="goDestination()">
      <span class="step-num"><i class="fa-solid fa-check" style="font-size:8px;"></i></span>
      Destination
    </span>
    <div class="step-connector done"></div>
    <span class="step done" onclick="goTravellers()">
      <span class="step-num"><i class="fa-solid fa-check" style="font-size:8px;"></i></span>
      Travellers
    </span>
    <div class="step-connector done"></div>
    <span class="step active">
      <span class="step-num">3</span>
      Duration
    </span>
    <div class="step-connector"></div>
    <span class="step"><span class="step-num">4</span>Departure city</span>
    <div class="step-connector"></div>
    <span class="step"><span class="step-num">5</span>Departure date</span>
  </div>
  <div style="width:28px;"></div>
</div>

<!-- SECTION -->
<section class="door-section">
  <video autoplay muted loop class="door-video">
    <source src="duration-bg.mp4" type="video/mp4">
  </video>
  <div class="door-overlay"></div>

  <div class="door-glass">
    <div class="glass-header">
      <span class="glass-eyebrow">Step 3 of 5</span>
      <h2>Select trip <span>Duration</span></h2>
    </div>

    <div class="slider-wrapper">
      <button class="arrow left" id="leftArrow" onclick="slideLeft()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <button class="arrow right" id="rightArrow" onclick="slideRight()">
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="door-grid-scroll" id="sliderScroll">
        <div class="door-grid" id="slider">

          <!-- 1 DAY -->
          <div class="door-card-wrapper" onclick="goNext('1', this)">
            <div class="card-glow-bg"></div>
            <div class="door-card">
              <img src="one-suitcase.png" alt="1 Day">
              <div class="card-text">
                <span class="card-label">Duration</span>
                <div class="name">1 Day</div>
              </div>
            </div>
          </div>

          <!-- 2 DAYS -->
          <div class="door-card-wrapper" onclick="goNext('2', this)">
            <div class="card-glow-bg"></div>
            <div class="door-card">
              <img src="two-suitcase.png" alt="2 Days">
              <div class="card-text">
                <span class="card-label">Duration</span>
                <div class="name">2 Days</div>
              </div>
            </div>
          </div>

          <!-- 3 DAYS -->
          <div class="door-card-wrapper" onclick="goNext('3', this)">
            <div class="card-glow-bg"></div>
            <div class="door-card">
              <img src="three-suitcase.png" alt="3 Days">
              <div class="card-text">
                <span class="card-label">Duration</span>
                <div class="name">3 Days</div>
              </div>
            </div>
          </div>

          <!-- 4–5 DAYS COMBO -->
          <div class="door-card-wrapper combo-card" id="comboWrapper">
            <div class="card-glow-bg"></div>
            <div class="door-card">
              <img src="five-suitcase.png" alt="4-5 Days">
              <div class="card-text">
                <span class="card-label">Duration</span>
                <div class="name">4 – 5 Days</div>
              </div>
              <!-- inline toggle — pick 4 or 5 -->
              <div class="combo-toggle">
                <button class="combo-btn" onclick="pickCombo(4, event)">4 Days</button>
                <div class="combo-sep"></div>
                <button class="combo-btn" onclick="pickCombo(5, event)">5 Days</button>
              </div>
            </div>
          </div>

        </div><!-- /door-grid -->
      </div><!-- /door-grid-scroll -->
    </div>
  </div>
</section>

<script>
/* ── Navigation ── */
function goNext(days, el){
  el.classList.add('selected');
  setTimeout(()=>{
    localStorage.setItem('tripDuration', days);
    window.location.href = 'depart-city.html';
  }, 300);
}

function pickCombo(days, e){
  e.stopPropagation();
  const wrapper = document.getElementById('comboWrapper');
  wrapper.classList.add('selected');
  setTimeout(()=>{
    localStorage.setItem('tripDuration', days);
    window.location.href = 'depart-city.html';
  }, 300);
}

function goDestination(){ window.location.href = 'details-one.html'; }
function goTravellers(){  window.location.href = 'travellers.html'; }

/* ── Mobile tap for combo card ── */
const comboWrapper = document.getElementById('comboWrapper');
comboWrapper.addEventListener('click', function(e){
  if(window.innerWidth > 600) return;
  if(e.target.closest('.combo-toggle')) return;
  e.stopPropagation();
  this.classList.toggle('open');
});
document.addEventListener('click', function(e){
  if(window.innerWidth > 600) return;
  if(!e.target.closest('#comboWrapper')){
    comboWrapper.classList.remove('open');
  }
});

/* ── Slider ── */
const sliderScroll = document.getElementById('sliderScroll');
const leftArrow    = document.getElementById('leftArrow');
const rightArrow   = document.getElementById('rightArrow');

function updateArrows(){
  const max = sliderScroll.scrollWidth - sliderScroll.clientWidth;
  leftArrow.style.display  = sliderScroll.scrollLeft <= 8       ? 'none' : 'flex';
  rightArrow.style.display = sliderScroll.scrollLeft >= max - 8 ? 'none' : 'flex';
}
function slideLeft(){  sliderScroll.scrollBy({left: window.innerWidth<=600 ? -180 : -260, behavior:'smooth'}); }
function slideRight(){ sliderScroll.scrollBy({left: window.innerWidth<=600 ?  180 :  260, behavior:'smooth'}); }

sliderScroll.addEventListener('scroll', updateArrows);
window.addEventListener('resize', updateArrows);
updateArrows();

/* ── Scrolled navbar ── */
window.addEventListener('scroll', ()=>{
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
});

window.onload = ()=>{ document.body.classList.add('loaded'); };
</script>
